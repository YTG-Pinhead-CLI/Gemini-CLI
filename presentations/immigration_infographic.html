<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immigration Trends: JP vs UK (2014-2024)</title>
    <!-- Chart.js CDN (オフラインで使う場合はこのJSファイルをダウンロードしてローカルパスに変更) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --jp-color: #ff4757;
            --uk-color: #2e86de;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #fff;
        }
        p.subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .chart-wrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            border-top: 1px solid #444;
            padding-top: 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
        }
        .jp-text { color: var(--jp-color); }
        .uk-text { color: var(--uk-color); }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>移民流入数の推移 (2014 - 2024)</h1>
    <p class="subtitle">日本 vs イギリス：過去10年間の新規入国者数比較</p>

    <div class="chart-wrapper">
        <canvas id="immigrationChart"></canvas>
    </div>

    <div class="stats-grid">
        <div class="stat-item">
            <span class="jp-text">JAPAN</span>
            <span class="stat-value">~660,000</span>
            <span style="font-size: 0.8rem;">2024年 推計流入数</span>
        </div>
        <div class="stat-item">
            <span class="uk-text">UNITED KINGDOM</span>
            <span class="stat-value">~1,207,000</span>
            <span style="font-size: 0.8rem;">2024年 推計流入数</span>
        </div>
    </div>
</div>

<p class="footer">Source: UK ONS / Japan Immigration Services Agency (ISA). *2024 values are projections.</p>

<script>
    const ctx = document.getElementById('immigrationChart').getContext('2d');
    
    // データセット
    const labels = ['2014', '2015', '2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024'];
    const dataJP = [210000, 230000, 250000, 280000, 300000, 350000, 100000, 57600, 144000, 450000, 660000];
    const dataUK = [632000, 631000, 589000, 630000, 611000, 715000, 606000, 573000, 1100000, 1320000, 1207000];

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: '日本 (流入数)',
                    data: dataJP,
                    borderColor: '#ff4757',
                    backgroundColor: 'rgba(255, 71, 87, 0.1)',
                    borderWidth: 3,
                    pointRadius: 4,
                    tension: 0.3,
                    fill: true
                },
                {
                    label: 'イギリス (流入数)',
                    data: dataUK,
                    borderColor: '#2e86de',
                    backgroundColor: 'rgba(46, 134, 222, 0.1)',
                    borderWidth: 3,
                    pointRadius: 4,
                    tension: 0.3,
                    fill: true
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: '#e0e0e0', font: { size: 14 } }
                },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: { color: '#444' },
                    ticks: { 
                        color: '#888',
                        callback: function(value) { return value.toLocaleString(); }
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: { color: '#888' }
                }
            }
        }
    });
</script>

</body>
</html>
